name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkoutv4
      - uses: actions/setup-nodev4
        with:
          node-version: 20
      - run: |
          test -f README.md
          test -f docs/ARCHITECTURE.md
          test -f contracts/platform.json
